[start]
command:/usr/local/opnsense/scripts/keaubnd/start.py
parameters:
type:script_output
message:starting kea-ubnd-ddns
description:Kea Unbound DDNS

[stop]
command:/usr/local/opnsense/scripts/keaubnd/stop.py
parameters:
type:script_output
message:stopping kea-ubnd-ddns
description:Kea Unbound DDNS

[restart]
command:/usr/local/opnsense/scripts/keaubnd/stop.py ; /usr/local/opnsense/scripts/keaubnd/start.py
parameters:
type:script_output
message:restarting kea-ubnd-ddns
description:Kea Unbound DDNS

[status]
command:/usr/local/sbin/pluginctl -s kea-ubnd-ddns status
parameters:
type:script_output
message:checking kea-ubnd-ddns status
description:Kea Unbound DDNS

[logwatcher_status]
command:/bin/sh -c 'pf=/var/run/kea-ubnd-logwatch.supervisor.pid; test -f "$pf" && kill -0 "$(cat "$pf")" 2>/dev/null && echo "kea-ubnd-logwatch is running" || echo "kea-ubnd-logwatch is not running"'
parameters:
type:script_output
message:checking kea-ubnd-logwatch status
description:Kea Unbound DDNS

[sync_full]
command:/usr/local/opnsense/scripts/keaubnd/run-sync.py
parameters:
type:script_output
message:Syncing Kea leases and reservations to Unbound
description:Kea Unbound DDNS: full sync (leases need reservation context)

[clean]
command:/usr/local/opnsense/scripts/keaubnd/run-clean.py
parameters:
type:script_output
message:Cleaning stale DNS records from Unbound
description:Kea Unbound DDNS: clean stale DNS records

[fast_reload]
command:/usr/local/opnsense/scripts/keaubnd/fast-reload.py
parameters:
type:script_output
message:Running Unbound fast-reload (snapshot, reload, restore)
description:Kea Unbound DDNS: fast-reload memory recovery
