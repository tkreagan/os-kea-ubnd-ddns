[start]
command:/usr/local/opnsense/scripts/keaubnd/start.py
parameters:
type:script_output
message:starting kea-ubnd-ddns
description:Kea Unbound DDNS

[stop]
command:/usr/local/opnsense/scripts/keaubnd/stop.py
parameters:
type:script_output
message:stopping kea-ubnd-ddns
description:Kea Unbound DDNS

[restart]
command:/usr/local/opnsense/scripts/keaubnd/stop.py ; /usr/local/opnsense/scripts/keaubnd/start.py
parameters:
type:script_output
message:restarting kea-ubnd-ddns
description:Kea Unbound DDNS

[status]
command:/usr/local/sbin/pluginctl -s kea-ubnd-ddns status
parameters:
type:script_output
message:checking kea-ubnd-ddns status
description:Kea Unbound DDNS

[sync_static]
command:/usr/local/opnsense/scripts/keaubnd/kea-sync.py --mode=static
parameters:
type:script_output
message:Syncing Kea static reservations to Unbound
description:Kea Unbound DDNS: sync static reservations

[sync_dynamic]
command:/usr/local/opnsense/scripts/keaubnd/kea-sync.py --mode=full
parameters:
type:script_output
message:Syncing Kea leases and reservations to Unbound
description:Kea Unbound DDNS: full sync (leases need reservation context)

[clean]
command:/usr/local/opnsense/scripts/keaubnd/local-data-clean.py
parameters:
type:script_output
message:Cleaning stale DNS records from Unbound
description:Kea Unbound DDNS: clean stale DNS records
