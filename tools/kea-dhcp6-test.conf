{
"Dhcp6": {
    "interfaces-config": {
        "interfaces": [ "em1" ]
    },

    "control-socket": {
        "socket-type": "unix",
        "socket-name": "/var/run/kea/kea6-ctrl-socket"
    },

    "hooks-libraries": [
        { "library": "/usr/local/lib/kea/hooks/libdhcp_lease_cmds.so" },
        { "library": "/usr/local/lib/kea/hooks/libdhcp_host_cmds.so" }
    ],

    "lease-database": {
        "type": "memfile",
        "name": "/var/db/kea/kea-leases6.csv",
        "lfc-interval": 3600
    },

    "expired-leases-processing": {
        "reclaim-timer-wait-time": 10,
        "flush-reclaimed-timer-wait-time": 25,
        "hold-reclaimed-time": 3600,
        "max-reclaim-leases": 100,
        "max-reclaim-time": 250,
        "unwarned-reclaim-cycles": 5
    },

    "renew-timer": 900,
    "rebind-timer": 1800,
    "preferred-lifetime": 3600,
    "valid-lifetime": 7200,

    "ddns-send-updates": true,
    "ddns-qualifying-suffix": "dev.plhm.rgn.cm",
    "ddns-override-no-update": true,
    "ddns-generated-prefix": "kea6host",
    "ddns-replace-client-name": "when-not-present",

    "dhcp-ddns": {
        "enable-updates": true,
        "server-ip": "127.0.0.1",
        "server-port": 53001
    },

    "subnet6": [
        {
            "id": 1,
            "subnet": "fd00::/64",
            "interface": "em1",

            "pools": [
                { "pool": "fd00::100 - fd00::1ff" }
            ],

            "ddns-send-updates": true,
            "ddns-qualifying-suffix": "dev.plhm.rgn.cm",
            "ddns-override-no-update": true,

            "option-data": [
                {
                    "name": "dns-servers",
                    "data": "fd00::1"
                }
            ],

            "reservations": [
                {
                    "hw-address": "de:ad:be:ef:06:62",
                    "ip-addresses": [ "fd00::200" ],
                    "hostname": "v6res1"
                },
                {
                    "hw-address": "de:ad:be:ef:06:63",
                    "ip-addresses": [ "fd00::201", "fd00::202" ],
                    "hostname": "v6res2-multiaddr"
                }
            ]
        }
    ],

    "loggers": [
        {
            "name": "kea-dhcp6",
            "output-options": [
                { "output": "syslog" }
            ],
            "severity": "DEBUG",
            "debuglevel": 10
        }
    ]
}
}
